services:
  backend:
    build:
      context: ../tp1c2026/backend
    ports:
      - "8080:8080"
    networks:
      - tacs-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      args:
        VITE_API_BASE_URL: http://backend:8080
    ports:
      - "80:80"
    networks:
      - tacs-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  tacs-network:
    driver: bridge
