services:
  mongo:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - tacs-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - tacs-network
    restart: "no"
    command: >
      mongosh --host mongo:27017 --quiet --eval
      'try { rs.status().ok } catch (e) { rs.initiate({_id: "rs0", members: [{_id: 0, host: "mongo:27017"}]}); }
       while (!db.hello().isWritablePrimary) { sleep(200); }'

  mongo-seed:
    image: mongo:7
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    volumes:
      - ./seed:/seed:ro
    networks:
      - tacs-network
    command: >
      mongosh "mongodb://mongo:27017/tacs_db?directConnection=true" --file /seed/seed.js
    restart: "no"

  backend:
    build:
      context: ../tp1c2026/backend
    ports:
      - "8080:8080"
    depends_on:
      mongo:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      mongo-seed:
        condition: service_completed_successfully
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/tacs_db?directConnection=true
      MONGO_DATABASE: tacs_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    networks:
      - tacs-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      args:
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "80:80"
    networks:
      - tacs-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  tacs-network:
    driver: bridge

volumes:
  mongo_data:
